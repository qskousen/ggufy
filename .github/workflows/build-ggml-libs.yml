name: Build GGML Static Libraries

on:
  workflow_dispatch:

jobs:
  ###########################################################################
  # LINUX (Ubuntu 24.04)
  ###########################################################################
  linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang libc++-dev libc++abi-dev cmake ninja-build

      - name: Build GGML (Linux)
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          export CC=clang
          export CXX=clang++
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++" \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Upload Linux GGML libs
        uses: actions/upload-artifact@v4
        with:
          name: ggml-linux-x86_64
          path: |
            vendor/ggml/build/src/libggml.a
            vendor/ggml/build/src/libggml-base.a
            vendor/ggml/build/src/libggml-cpu.a

  ###########################################################################
  # MACOS (x86_64 + arm64)
  ###########################################################################
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build GGML (macOS)
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            ..
          ninja

      - name: Upload macOS GGML libs
        uses: actions/upload-artifact@v4
        with:
          name: ggml-macos-${{ matrix.arch }}
          path: |
            vendor/ggml/build/src/libggml.a
            vendor/ggml/build/src/libggml-base.a
            vendor/ggml/build/src/libggml-cpu.a

  ###########################################################################
  # WINDOWS (MSVC)
  ###########################################################################
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: choco install -y ninja cmake
        shell: pwsh

      - name: Build GGML (Windows)
        run: |
          cd vendor/ggml
          rmdir /S /Q build
          mkdir build
          cd build
          cmake -G "Ninja" ^
            -DGGML_STATIC=ON ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DGGML_CPU_BACKEND=ON ^
            -DGGML_BUILD_EXAMPLES=OFF ^
            -DGGML_BUILD_TESTS=OFF ^
            -DGGML_BUILD_TOOLS=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
            ..
          ninja
        shell: cmd

      - name: Upload Windows GGML libs
        uses: actions/upload-artifact@v4
        with:
          name: ggml-windows-x86_64
          path: |
            vendor/ggml/build/src/ggml.lib
            vendor/ggml/build/src/ggml-base.lib
            vendor/ggml/build/src/ggml-cpu.lib
