name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ###########################################################################
  # LINUX BUILD (Ubuntu 24.04 container to match glibc >= 2.38)
  ###########################################################################
  linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y git curl zip clang libc++-dev libc++abi-dev cmake ninja-build

      - name: Install Zig
        run: |
          curl -L https://github.com/ziglang/zig/releases/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz \
            | tar xJ
          mv zig-linux-x86_64-0.15.2 /opt/zig
          echo "/opt/zig" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build GGML (Linux)
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          export CC=clang
          export CXX=clang++
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++" \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build Zig binary (Linux)
        run: |
          zig build --release=fast -Dtarget=x86_64-linux
          mkdir -p dist
          cp zig-out/bin/ggufy dist/ggufy-linux-x86_64
          cd dist
          zip ../ggufy-linux-x86_64.zip ggufy-linux-x86_64
          cd ..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: ggufy-linux-x86_64.zip

  ###########################################################################
  # MACOS + WINDOWS MATRIX
  ###########################################################################
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      #######################################################################
      # macOS
      #######################################################################
      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake ninja

      - name: Build GGML (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build Zig binaries (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist

          zig build --release=fast -Dtarget=x86_64-macos
          cp zig-out/bin/ggufy dist/ggufy-macos-x86_64

          zig build --release=fast -Dtarget=aarch64-macos
          cp zig-out/bin/ggufy dist/ggufy-macos-aarch64

          cd dist
          zip ../ggufy-macos-x86_64.zip ggufy-macos-x86_64
          zip ../ggufy-macos-aarch64.zip ggufy-macos-aarch64
          cd ..

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            ggufy-macos-x86_64.zip
            ggufy-macos-aarch64.zip

      #######################################################################
      # WINDOWS
      #######################################################################
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y ninja cmake
        shell: pwsh

      - name: Build GGML (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G "Ninja" ^
            -DGGML_STATIC=ON ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DGGML_CPU_BACKEND=ON ^
            -DGGML_BUILD_EXAMPLES=OFF ^
            -DGGML_BUILD_TESTS=OFF ^
            -DGGML_BUILD_TOOLS=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            ..
          ninja
        shell: cmd

      - name: Build Zig binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          zig build --release=fast -Dtarget=x86_64-windows
          mkdir dist
          copy zig-out\bin\ggufy.exe dist\ggufy-windows-x86_64.exe
          cd dist
          powershell -Command "Compress-Archive ggufy-windows-x86_64.exe ..\ggufy-windows-x86_64.zip"
          cd ..
        shell: cmd

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: ggufy-windows-x86_64.zip

  ###########################################################################
  # RELEASE JOB
  ###########################################################################
  release:
    needs: [linux, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux-artifacts/ggufy-linux-x86_64.zip
            dist/windows-artifacts/ggufy-windows-x86_64.zip
            dist/macos-artifacts/ggufy-macos-x86_64.zip
            dist/macos-artifacts/ggufy-macos-aarch64.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
