name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # -------------------- OS-specific deps --------------------
      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y clang libc++-dev libc++abi-dev cmake ninja-build

      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake ninja

      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y ninja cmake
        shell: pwsh

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # -------------------- GGML cache --------------------
      - name: Restore GGML build cache
        uses: actions/cache@v4
        with:
          path: vendor/ggml/build
          key: ggml-${{ matrix.os }}-${{ hashFiles('vendor/ggml/CMakeLists.txt', 'vendor/ggml/src/**') }}

      # -------------------- Build GGML per OS --------------------
      - name: Build GGML (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++" \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build GGML (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DGGML_BUILD_EXAMPLES=OFF \
            -DGGML_BUILD_TESTS=OFF \
            -DGGML_BUILD_TOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build GGML (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G "Ninja" ^
            -DGGML_STATIC=ON ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DGGML_CPU_BACKEND=ON ^
            -DGGML_BUILD_EXAMPLES=OFF ^
            -DGGML_BUILD_TESTS=OFF ^
            -DGGML_BUILD_TOOLS=OFF ^
            -DCMAKE_BUILD_TYPE=Release ^
            ..
          ninja
        shell: cmd

      # -------------------- Build Zig binaries --------------------
      - name: Build + package (Linux x86_64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          zig build --release=fast -Dtarget=x86_64-linux
          mkdir -p dist/linux
          cp zig-out/bin/ggufy dist/linux/ggufy
          cd dist/linux
          zip ../ggufy-linux-x86_64.zip ggufy
          cd ../..

      - name: Build + package (Windows x86_64)
        if: matrix.os == 'windows-latest'
        run: |
          zig build --release=fast -Dtarget=x86_64-windows
          mkdir -p dist/windows
          copy zig-out\bin\ggufy.exe dist\windows\ggufy.exe
          cd dist\windows
          powershell -Command "Compress-Archive ggufy.exe ..\ggufy-windows-x86_64.zip"
          cd ..\..
        shell: cmd

      - name: Build + package (macOS x86_64)
        if: matrix.os == 'macos-latest'
        run: |
          zig build --release=fast -Dtarget=x86_64-macos
          mkdir -p dist/macos-x86_64
          cp zig-out/bin/ggufy dist/macos-x86_64/ggufy
          cd dist/macos-x86_64
          zip ../ggufy-macos-x86_64.zip ggufy
          cd ../..

      - name: Build + package (macOS aarch64)
        if: matrix.os == 'macos-latest'
        run: |
          zig build --release=fast -Dtarget=aarch64-macos
          mkdir -p dist/macos-aarch64
          cp zig-out/bin/ggufy dist/macos-aarch64/ggufy
          cd dist/macos-aarch64
          zip ../ggufy-macos-aarch64.zip ggufy
          cd ../..

      # -------------------- Upload artifacts --------------------
      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/ggufy-linux-x86_64.zip

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/ggufy-windows-x86_64.zip

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/ggufy-macos-x86_64.zip
            dist/ggufy-macos-aarch64.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux-artifacts/ggufy-linux-x86_64.zip
            dist/windows-artifacts/ggufy-windows-x86_64.zip
            dist/macos-artifacts/ggufy-macos-x86_64.zip
            dist/macos-artifacts/ggufy-macos-aarch64.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}