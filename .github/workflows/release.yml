name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      #######################################################################
      # LINUX BUILD
      #######################################################################
      - name: Install Linux build deps
        run: |
          sudo apt update
          sudo apt install -y clang libc++-dev libc++abi-dev ninja-build cmake

      - name: Build GGML (Linux)
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++" \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build Zig binary (Linux x86-64)
        run: |
          zig build --release=fast -Dtarget=x86_64-linux
          mkdir -p dist/linux
          cp zig-out/bin/ggufy dist/linux/ggufy
          cd dist/linux
          zip ../ggufy-linux-x86_64.zip ggufy
          cd ../..

      #######################################################################
      # WINDOWS BUILD
      #######################################################################
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build GGML (Windows)
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G "Ninja" \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build Zig binary (Windows x86-64)
        run: |
          zig build --release=fast -Dtarget=x86_64-windows
          mkdir -p dist/windows
          cp zig-out/bin/ggufy.exe dist/windows/ggufy.exe
          cd dist/windows
          zip ../ggufy-windows-x86_64.zip ggufy.exe
          cd ../..

      #######################################################################
      # MACOS BUILDS
      #######################################################################
      - name: Build GGML (macOS)
        if: runner.os == 'macOS'
        run: |
          cd vendor/ggml
          rm -rf build && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CPU_BACKEND=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          ninja

      - name: Build Zig binary (macOS x86-64)
        if: runner.os == 'macOS'
        run: |
          zig build --release=fast -Dtarget=x86_64-macos
          mkdir -p dist/macos-x86_64
          cp zig-out/bin/ggufy dist/macos-x86_64/ggufy
          cd dist/macos-x86_64
          zip ../ggufy-macos-x86_64.zip ggufy
          cd ../..

      - name: Build Zig binary (macOS aarch64)
        if: runner.os == 'macOS'
        run: |
          zig build --release=fast -Dtarget=aarch64-macos
          mkdir -p dist/macos-aarch64
          cp zig-out/bin/ggufy dist/macos-aarch64/ggufy
          cd dist/macos-aarch64
          zip ../ggufy-macos-aarch64.zip ggufy
          cd ../..

      #######################################################################
      # RELEASE
      #######################################################################
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ggufy-linux-x86_64.zip
            dist/ggufy-windows-x86_64.zip
            dist/ggufy-macos-x86_64.zip
            dist/ggufy-macos-aarch64.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}